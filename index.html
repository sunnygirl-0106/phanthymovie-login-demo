<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhanthyMovie · 登录态演示</title>
<style>
  :root{
    --teal:#26B5C2; --teal-light:#3FCEDB; --teal-dark:#1A8A95;
    --bg:#0B1118; --card:rgba(22,27,36,.72); --card-border:rgba(255,255,255,.08);
    --text:#F1F3F5; --text-2:#A6ABB5; --text-3:#6C7280;
    --danger:#F0556B; --warn:#F5B254;
    --field-bg:rgba(255,255,255,.04); --field-border:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text); overflow:hidden; position:relative;
    background:var(--bg);
  }
  /* ---- 电影感原创背景（非版权图）---- */
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
  .bg::before{
    content:"";position:absolute;inset:-10%;
    background:
      radial-gradient(60% 50% at 22% 38%, rgba(38,140,160,.32), transparent 60%),
      radial-gradient(55% 60% at 78% 28%, rgba(70,60,160,.28), transparent 62%),
      radial-gradient(70% 80% at 60% 95%, rgba(10,30,45,.65), transparent 70%),
      linear-gradient(160deg,#0d1a24 0%,#0a0f17 55%,#070a10 100%);
    filter:saturate(1.05);
  }
  .bg .smoke{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;animation:drift 22s ease-in-out infinite}
  .smoke.s1{width:620px;height:620px;left:-6%;top:18%;background:radial-gradient(circle,#1f7d8e,transparent 65%)}
  .smoke.s2{width:540px;height:540px;right:-4%;top:6%;background:radial-gradient(circle,#4a3f9c,transparent 65%);animation-delay:-7s}
  .smoke.s3{width:700px;height:500px;left:32%;bottom:-18%;background:radial-gradient(circle,#0e3a4a,transparent 60%);animation-delay:-13s}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,-22px) scale(1.08)}}
  .bg .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 45%,transparent 45%,rgba(0,0,0,.62) 100%)}
  .bg .grain{position:absolute;inset:0;opacity:.05;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")}

  /* ---- 顶部 logo ---- */
  .topbar{position:fixed;top:26px;right:34px;z-index:3;display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.3px}
  .topbar .mark{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,var(--teal-light),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-size:13px;color:#06222a;font-weight:800}

  /* ---- 登录卡 ---- */
  .stage{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{
    width:430px;max-width:94vw;background:var(--card);
    backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);
    border:1px solid var(--card-border);border-radius:22px;padding:38px 36px 26px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05);
  }
  .brand{text-align:center;margin-bottom:26px}
  .brand h1{font-size:26px;font-weight:700;letter-spacing:.5px}
  .brand p{margin-top:7px;font-size:13px;color:var(--text-3);letter-spacing:2px}

  /* state banner（状态类拦截：常驻） */
  .banner{display:none;align-items:flex-start;gap:10px;padding:12px 13px;border-radius:12px;margin-bottom:20px;font-size:13px;line-height:1.55}
  .banner.show{display:flex;animation:pop .25s ease}
  .banner .ico{flex:0 0 auto;width:18px;height:18px;margin-top:1px}
  .banner.danger{background:rgba(240,85,107,.12);border:1px solid rgba(240,85,107,.35);color:#ffd2d9}
  .banner.danger .ico{color:var(--danger)}
  .banner.warn{background:rgba(245,178,84,.12);border:1px solid rgba(245,178,84,.35);color:#ffe6c2}
  .banner.warn .ico{color:var(--warn)}
  .banner b{font-weight:600;color:#fff}
  @keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

  /* tabs */
  .tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--field-border);border-radius:13px;padding:4px;margin-bottom:22px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--text-2);font-size:14px;padding:9px 0;border-radius:10px;cursor:pointer;transition:.18s;font-family:inherit}
  .tabs button.active{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;box-shadow:0 4px 14px rgba(38,181,194,.35)}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--text-2);margin-bottom:8px}
  .field input{width:100%;background:var(--field-bg);border:1px solid var(--field-border);border-radius:12px;color:var(--text);font-size:15px;padding:13px 14px;outline:none;transition:.18s;font-family:inherit}
  .field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(38,181,194,.18)}
  .field input.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(240,85,107,.15)}
  .field .inline-err{display:none;margin-top:7px;font-size:12.5px;color:var(--danger)}
  .field .inline-err.show{display:block;animation:pop .2s ease}

  .btn{width:100%;border:0;border-radius:999px;padding:14px 0;margin-top:8px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;
    background:linear-gradient(135deg,var(--teal-light),var(--teal));box-shadow:0 10px 26px rgba(38,181,194,.35);transition:.18s}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.55;cursor:not-allowed;box-shadow:none}
  .legal{text-align:center;margin-top:20px;font-size:12px;color:var(--text-3)}

  /* kick overlay（会话中被踢，正在退出） */
  .kick{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:rgba(7,10,16,.82);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
  .kick.show{opacity:1;pointer-events:auto}
  .kick .spin{width:38px;height:38px;border-radius:50%;border:3px solid rgba(240,85,107,.25);border-top-color:var(--danger);animation:spin .8s linear infinite}
  .kick p{font-size:15px;color:#ffd2d9}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* success toast */
  .toast{position:fixed;z-index:5;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);opacity:0;pointer-events:none;
    background:rgba(20,26,34,.92);backdrop-filter:blur(10px);border:1px solid rgba(52,211,153,.4);border-radius:16px;
    padding:22px 30px;text-align:center;transition:.28s}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .toast .check{width:46px;height:46px;border-radius:50%;background:rgba(52,211,153,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#34D399}
  .toast h3{font-size:16px;font-weight:600}
  .toast p{margin-top:5px;font-size:13px;color:var(--text-2)}

  /* ---- 演示控制台 ---- */
  .panel{position:fixed;z-index:4;left:22px;top:22px;width:280px;background:rgba(16,21,29,.92);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 16px 14px;box-shadow:0 20px 50px rgba(0,0,0,.5);font-size:13px}
  .panel.collapsed .panel-body{display:none}
  .panel-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .panel-head .t{display:flex;align-items:center;gap:8px;font-weight:600}
  .panel-head .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 8px var(--teal-light)}
  .panel-head .chev{color:var(--text-3);transition:.2s}
  .panel.collapsed .chev{transform:rotate(-90deg)}
  .panel .hint{color:var(--text-3);font-size:11.5px;line-height:1.5;margin:8px 0 12px}
  .scn{display:block;width:100%;text-align:left;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
    color:var(--text);border-radius:10px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:.15s;font-family:inherit;line-height:1.35}
  .scn:hover{border-color:rgba(255,255,255,.2)}
  .scn.active{border-color:var(--teal);background:rgba(38,181,194,.12)}
  .scn .name{font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:7px}
  .scn .meta{font-size:11px;color:var(--text-3);margin-top:3px}
  .pill{font-size:10px;padding:1px 7px;border-radius:999px;font-weight:600;letter-spacing:.2px}
  .pill.inline{background:rgba(240,85,107,.16);color:#ff9aa8}
  .pill.banner-p{background:rgba(245,178,84,.16);color:#ffcd8a}
  .pill.ok{background:rgba(52,211,153,.16);color:#5ee0b0}
  .panel .tip{font-size:11px;color:var(--text-3);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:4px;line-height:1.55}
</style>
</head>
<body>
  <div class="bg"><div class="smoke s1"></div><div class="smoke s2"></div><div class="smoke s3"></div><div class="vignette"></div><div class="grain"></div></div>

  <div class="topbar"><span class="mark">P</span><span>PhanthyMovie</span></div>

  <!-- 演示控制台 -->
  <div class="panel" id="panel">
    <div class="panel-head" onclick="togglePanel()">
      <span class="t"><span class="dot"></span>演示控制台</span>
      <span class="chev">▼</span>
    </div>
    <div class="panel-body">
      <div id="scnList"></div>
    </div>
  </div>

  <!-- 登录卡 -->
  <div class="stage">
    <div class="card">
      <div class="brand"><h1>PhanthyMovie</h1><p>工业化生产平台</p></div>

      <div class="banner" id="banner">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
        <div id="bannerText"></div>
      </div>

      <div class="tabs">
        <button id="tabPhone" onclick="setTab('phone')">手机验证码</button>
        <button id="tabPwd" class="active" onclick="setTab('pwd')">用户名密码</button>
      </div>

      <div class="field">
        <label id="userLabel">用户名</label>
        <input id="userInput" value="zhang-002" autocomplete="off" />
        <div class="inline-err" id="userErr"></div>
      </div>
      <div class="field" id="pwdField">
        <label>密码</label>
        <input id="pwdInput" type="password" value="••••••••••" />
        <div class="inline-err" id="pwdErr"></div>
      </div>

      <button class="btn" id="loginBtn" onclick="doLogin()">登录</button>
      <p class="legal">登录即表示您同意平台服务条款与隐私政策</p>
    </div>
  </div>

  <!-- kicked overlay -->
  <div class="kick" id="kick"><div class="spin"></div><p>账号已被停用，正在退出…</p></div>

  <!-- success -->
  <div class="toast" id="toast">
    <div class="check"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></div>
    <h3>登录成功</h3><p>正在进入工作台…</p>
  </div>

<script>
  // 场景定义：每一种后端返回 → 前端展示形态 + 文案
  const SCENES = {
    ok:        { name:"✅ 正常登录成功", kind:"ok",     pill:["ok","成功"],
                 desc:"凭证正确、账号启用、团队有效" },
    notfound:  { name:"账号不存在", kind:"inline", target:"user", pill:["inline","内联"],
                 desc:"邮箱/用户名查无此账号",
                 text:"账号不存在，请检查登录邮箱" },
    badpwd:    { name:"邮箱或密码错误", kind:"inline", target:"pwd", pill:["inline","内联"],
                 desc:"密码不匹配（不区分账号/密码，防枚举）",
                 text:"邮箱或密码错误，请重新输入" },
    disabled:  { name:"主账号手动禁用", kind:"banner", tone:"danger", pill:["banner-p","常驻条"],
                 desc:"owner_action：被主账号停用，团队仍有效",
                 html:"<b>该账号已被停用，无法登录。</b><br>如需恢复，请联系团队主账号重新启用。" },
    expired:   { name:"团队套餐到期", kind:"banner", tone:"warn", pill:["banner-p","常驻条"],
                 desc:"plan_expired：全团队子账号被系统禁用",
                 html:"<b>团队套餐已到期，账号暂时无法登录。</b><br>请联系主账号续费后恢复使用。" },
    kicked:    { name:"会话中被踢下线", kind:"banner", tone:"danger", autoKick:true, pill:["banner-p","常驻条"],
                 desc:"已登录的子账号被主账号停用，自动弹回登录页",
                 html:"<b>您的账号已被主账号停用，已退出登录。</b><br>如需恢复，请联系团队主账号重新启用。" },
  };
  const ORDER = ["ok","notfound","badpwd","disabled","expired","kicked"];
  let current = "disabled"; // 默认演示「手动禁用」

  // 渲染控制台
  const list = document.getElementById("scnList");
  ORDER.forEach(k=>{
    const s = SCENES[k];
    const b = document.createElement("button");
    b.className = "scn" + (k===current?" active":"");
    b.dataset.k = k;
    b.innerHTML = `<div class="name">${s.name}<span class="pill ${s.pill[0]}">${s.pill[1]}</span></div><div class="meta">${s.desc}</div>`;
    b.onclick = ()=>{ current=k; syncActive(); clearFeedback();
      if(SCENES[k].autoKick) simulateKick(); };
    list.appendChild(b);
  });
  function syncActive(){ document.querySelectorAll(".scn").forEach(e=>e.classList.toggle("active", e.dataset.k===current)); }

  function clearFeedback(){
    document.getElementById("banner").classList.remove("show");
    ["userErr","pwdErr"].forEach(id=>document.getElementById(id).classList.remove("show"));
    ["userInput","pwdInput"].forEach(id=>document.getElementById(id).classList.remove("err"));
    document.getElementById("toast").classList.remove("show");
    document.getElementById("kick").classList.remove("show");
  }

  function showBanner(s){
    const banner=document.getElementById("banner");
    banner.className = "banner show " + s.tone;
    document.getElementById("bannerText").innerHTML = s.html;
  }

  // 会话中被主账号停用 → 黑屏「正在退出…」→ 弹回登录页并常驻提示
  function simulateKick(){
    const k=document.getElementById("kick");
    k.classList.add("show");
    setTimeout(()=>{ k.classList.remove("show"); showBanner(SCENES.kicked); }, 1400);
  }

  function doLogin(){
    clearFeedback();
    const s = SCENES[current];
    if(s.autoKick){ simulateKick(); return; }
    if(s.kind==="ok"){
      const t=document.getElementById("toast"); t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"),2200); return;
    }
    if(s.kind==="inline"){
      const inputId = s.target==="user" ? "userInput" : "pwdInput";
      const errId   = s.target==="user" ? "userErr"   : "pwdErr";
      document.getElementById(inputId).classList.add("err");
      const e=document.getElementById(errId); e.textContent=s.text; e.classList.add("show"); return;
    }
    if(s.kind==="banner"){
      const banner=document.getElementById("banner");
      banner.className = "banner show " + s.tone;
      document.getElementById("bannerText").innerHTML = s.html;
    }
  }

  // tabs
  function setTab(t){
    document.getElementById("tabPhone").classList.toggle("active",t==="phone");
    document.getElementById("tabPwd").classList.toggle("active",t==="pwd");
    document.getElementById("userLabel").textContent = t==="phone" ? "手机号" : "用户名";
    document.getElementById("userInput").value = t==="phone" ? "138 0013 8000" : "zhang-002";
    document.getElementById("pwdField").style.display = t==="phone" ? "none" : "block";
    clearFeedback();
  }
  function togglePanel(){ document.getElementById("panel").classList.toggle("collapsed"); }

  // 进入即展示默认场景效果
  doLogin();
</script>
</body>
</html>
